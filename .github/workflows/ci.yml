name: Carbifyio CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── Backend: lint + test ──────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff black

      - name: Lint with Ruff
        run: |
          ruff check backend/app/ backend/tests/ --output-format=github

      - name: Check formatting with Black
        run: |
          black --check --diff backend/app/ backend/tests/

      - name: Run pytest suite
        env:
          ENV: testing
          SECRET_KEY: ci-test-secret-key-not-for-production-32b
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest backend/tests/ -v --tb=short

  # ── Frontend: lint ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dev dependencies
        run: npm ci

      - name: Run Vitest unit tests
        run: npm test -- --run

      - name: Lint JS with ESLint
        run: npm run lint

server {
    listen 8080;
    # server_name is intentionally generic — it matches any hostname presented
    # by the container, including Docker service aliases, custom domains, and
    # the IP address used in development.  No hardcoded "localhost" needed.
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                        always;
    add_header X-Content-Type-Options     "nosniff"                     always;
    add_header X-XSS-Protection           "1; mode=block"               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # CSP connect-src uses 'self' exclusively:
    #   • All XHR/fetch calls target relative /api/* paths.
    #   • Nginx proxies /api/ → backend:8000 server-side, so the browser never
    #     speaks directly to the backend container.
    #   • 'self' resolves to whatever origin the browser loaded the page from —
    #     works for localhost, Docker IPs, and production domains equally.
    #   • No hardcoded "localhost" or IP — container-to-container and domain-
    #     aware networking function correctly in any environment.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:;" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── SPA Routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse Proxy: /api/ → backend Docker service ─────────────────────────
    # All /api/ calls from the browser are proxied server-side to the backend
    # container.  The browser therefore only ever talks to 'self', keeping the
    # CSP minimal and environment-agnostic.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Surface upstream error codes to the client
        proxy_intercept_errors on;
    }

    # ── Static Asset Caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Custom Error Pages ────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
